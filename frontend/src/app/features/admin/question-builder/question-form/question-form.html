<div class="container">
  <form [formGroup]="questionForm" (ngSubmit)="save()">

    <!-- CONFIGURATION PRINCIPALE -->
    <div class="main-grid">
      <div style="display: flex; flex-direction: column; gap: 24px;">
        <app-question-general [form]="questionForm"></app-question-general>
      </div>
    </div>

    <!-- ACTIONS FOOTER -->
    <div class="footer-actions">
      <div class="left-buttons">
        <button class="btn btn-secondary" type="button" (click)="cancel()" [disabled]="isSubmitting">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
          Cancel
        </button>
        <button class="btn btn-primary" type="submit" [disabled]="isSubmitting"> 
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
    <polyline points="17 21 17 13 7 13 7 21"></polyline>
    <polyline points="7 3 7 8 15 8"></polyline>
  </svg>
  <span>{{ isSubmitting ? 'Saving...' : 'Save question' }}</span>
</button>
      </div>
    </div>

  </form>
</div>
